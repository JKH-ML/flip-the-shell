<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1c1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#121417;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" rx="20" fill="url(#bgGrad)"/>
  <text x="400" y="180" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">Flip the Shell 🐚</text>
  <text x="400" y="230" font-family="Arial, sans-serif" font-size="24" fill="#87d530" text-anchor="middle" letter-spacing="2">UNVEIL THE HIDDEN LAYERS</text>
  <rect x="250" y="270" width="300" height="2" fill="#87d530" opacity="0.3"/>
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="16" fill="#909094" text-anchor="middle">Professional Steganography Decoder for RunningHub</text>
  <circle cx="400" cy="80" r="40" fill="white" opacity="0.05"/>
  <path d="M380 80 Q400 40 420 80 T460 80" fill="none" stroke="#87d530" stroke-width="4" opacity="0.5"/>
</svg>
