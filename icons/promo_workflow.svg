<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" rx="20" fill="#121417"/>
  
  <!-- Step 1 -->
  <g transform="translate(100, 100)">
    <circle cx="50" cy="50" r="40" fill="#1f2124" stroke="#87d530" stroke-width="2"/>
    <text x="50" y="58" font-family="Arial" font-size="32" fill="white" text-anchor="middle">🔍</text>
    <text x="50" y="120" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">1. DETECT</text>
    <text x="50" y="145" font-family="Arial" font-size="14" fill="#909094" text-anchor="middle">Auto-Scan Shells</text>
  </g>

  <!-- Arrow -->
  <path d="M220 150 L280 150" stroke="#444" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <g transform="translate(350, 100)">
    <circle cx="50" cy="50" r="40" fill="#1f2124" stroke="#87d530" stroke-width="2"/>
    <text x="50" y="58" font-family="Arial" font-size="32" fill="white" text-anchor="middle">🖱️</text>
    <text x="50" y="120" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">2. HOVER</text>
    <text x="50" y="145" font-family="Arial" font-size="14" fill="#909094" text-anchor="middle">View Icon Appears</text>
  </g>

  <!-- Arrow -->
  <path d="M470 150 L530 150" stroke="#444" stroke-width="2"/>

  <!-- Step 3 -->
  <g transform="translate(600, 100)">
    <circle cx="50" cy="50" r="40" fill="#87d530" stroke="#87d530" stroke-width="2"/>
    <text x="50" y="58" font-family="Arial" font-size="32" fill="black" text-anchor="middle">🎬</text>
    <text x="50" y="120" font-family="Arial" font-size="18" font-weight="bold" fill="white" text-anchor="middle">3. REVEAL</text>
    <text x="50" y="145" font-family="Arial" font-size="14" fill="#909094" text-anchor="middle">Instant Play/Save</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444" />
    </marker>
  </defs>
  
  <text x="400" y="320" font-family="Arial" font-size="20" fill="#87d530" text-anchor="middle" font-weight="bold">Seamless Integration with RunningHub Task List</text>
</svg>
