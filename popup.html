<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body { 
      width: 240px; 
      padding: 16px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #121417; 
      color: #e2e2e6;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .header img {
      width: 28px;
      height: 28px;
    }
    h2 { 
      font-size: 16px; 
      margin: 0; 
      color: #ffffff;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .version {
      font-size: 10px;
      color: #909094;
      background: #2e3033;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: auto;
    }
    .section {
      margin-bottom: 20px;
    }
    label { 
      font-size: 11px; 
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #909094; 
      display: block; 
      margin-bottom: 8px; 
      font-weight: 600;
    }
    select { 
      width: 100%; 
      padding: 10px; 
      border-radius: 8px; 
      border: 1px solid #3c4043; 
      background: #1f2124;
      color: #ffffff;
      font-size: 13px; 
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
    }
    select:hover {
      border-color: #5f6368;
      background: #25282c;
    }
    select:focus {
      border-color: #8ab4f8;
      box-shadow: 0 0 0 2px rgba(138, 180, 248, 0.2);
    }
    .btn-container {
      margin-top: 10px;
    }
    .btn-runninghub {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 40px;
      background: linear-gradient(135deg, #87d530 0%, #76bc29 100%);
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(135, 213, 48, 0.2);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      cursor: pointer;
    }
    .btn-runninghub:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(135, 213, 48, 0.3);
      filter: brightness(1.05);
    }
    .btn-runninghub:active {
      transform: translateY(0);
    }
    .footer { 
      margin-top: 16px; 
      font-size: 10px; 
      color: #5f6368; 
      text-align: center; 
      border-top: 1px solid #1f2124;
      padding-top: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="logo">
    <h2>Flip the Shell</h2>
    <span class="version">v3.1</span>
  </div>
  
  <div class="section">
    <label for="posSelect">View Icon Position</label>
    <select id="posSelect">
      <option value="center">Center (Default)</option>
      <option value="top-left">Top Left</option>
      <option value="top-right">Top Right</option>
      <option value="bottom-left">Bottom Left</option>
      <option value="bottom-right">Bottom Right</option>
    </select>
  </div>

  <div class="btn-container">
    <a href="https://www.runninghub.ai/?inviteCode=ux1wt2if" target="_blank" class="btn-runninghub">
      ⚡ Open RunningHub
    </a>
  </div>

  <div class="footer">
    Settings saved automatically
  </div>
  <script src="popup.js"></script>
</body>
</html>
