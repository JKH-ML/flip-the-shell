<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      width: 220px; 
      padding: 16px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #1a1c1e; 
      color: #e2e2e6;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header img {
      width: 24px;
      height: 24px;
    }
    h2 { 
      font-size: 16px; 
      margin: 0; 
      color: #ffffff;
      font-weight: 600;
    }
    .version {
      font-size: 10px;
      color: #909094;
      margin-left: auto;
    }
    .section {
      margin-bottom: 16px;
    }
    label { 
      font-size: 12px; 
      color: #c4c6cf; 
      display: block; 
      margin-bottom: 8px; 
    }
    select { 
      width: 100%; 
      padding: 8px; 
      border-radius: 8px; 
      border: 1px solid #44474e; 
      background: #2e3033;
      color: #ffffff;
      font-size: 13px; 
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus {
      border-color: #6366f1;
    }
    .btn-runninghub {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      background: #87d530;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn-runninghub:hover {
      opacity: 0.9;
    }
    .footer { 
      margin-top: 12px; 
      font-size: 10px; 
      color: #909094; 
      text-align: center; 
      border-top: 1px solid #44474e;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="logo">
    <h2>Flip the Shell</h2>
    <span class="version">v3.1</span>
  </div>
  
  <div class="section">
    <label for="posSelect">View Icon Position</label>
    <select id="posSelect">
      <option value="center">Center (Default)</option>
      <option value="top-left">Top Left</option>
      <option value="top-right">Top Right</option>
      <option value="bottom-left">Bottom Left</option>
      <option value="bottom-right">Bottom Right</option>
    </select>
  </div>

  <a href="https://www.runninghub.ai/?inviteCode=ux1wt2if" target="_blank" class="btn-runninghub">
    ⚡ Open RunningHub
  </a>

  <div class="footer">
    Settings are applied instantly
  </div>
  <script src="popup.js"></script>
</body>
</html>
